plan_id: indexer-demo-001
objective: |
  Build a demo application to test Azure AI Search Indexer change detection against Azure Blob Storage.
  Users upload/update PDF documents in Blob Storage, the indexer detects changes on a schedule, updates the search index,
  and a Streamlit chat interface provides RAG-powered Q&A over the indexed content via OpenAI models hosted in Azure AI Foundry.
  All Azure service-to-service communication uses Managed Identities (no API keys).
created_at: "2026-04-07"
created_by: requirements-planner
status: approved
research_confidence: high

tldr: |
  Terraform-provisioned Azure infrastructure (AI Search, Blob Storage, AI Foundry with OpenAI models) with a
  scheduled blob indexer that auto-detects document changes. All service-to-service auth via Managed Identities
  (system-assigned MI on AI Search with Storage Blob Data Reader; user-assigned MI on backend for Search, Storage,
  and Foundry access). Python FastAPI backend serves as RAG pipeline (search + OpenAI via Foundry). Streamlit
  frontend provides chat UI and document management. Primary goal is validating the indexer's "index changed
  documents" behavior end-to-end.

requirements_summary: |
  1. Provision Azure AI Search, Blob Storage, and Azure AI Foundry (with OpenAI model deployments) via Terraform.
  2. Configure Managed Identities for all service-to-service auth:
     - AI Search system-assigned MI → Storage Blob Data Reader on Storage Account
     - AI Search system-assigned MI → Cognitive Services OpenAI User on Foundry (if using integrated vectorization)
     - User-assigned MI for backend → Search Index Data Reader + Search Service Contributor on AI Search
     - User-assigned MI for backend → Storage Blob Data Contributor on Storage Account
     - User-assigned MI for backend → Cognitive Services OpenAI User on AI Foundry
  3. Configure a blob indexer with scheduled runs (every 5 minutes) and native change detection.
  4. Configure native blob soft delete for deletion detection.
  5. Build a FastAPI backend using DefaultAzureCredential (azure-identity SDK) for all Azure service access.
  6. Build a Streamlit chat interface for asking questions against the index.
  7. Provide document upload/update capability (upload PDFs to blob storage).
  8. Demonstrate the full cycle: upload → index → query → update document → re-index → query shows updated content.

open_questions: []

risk_assessment:
  overall_risk_level: medium
  critical_risks:
    - scenario: "Indexer change detection delay exceeds expectations"
      likelihood: medium
      impact: medium
      mitigation: "Configure 5-minute schedule, provide manual re-run trigger in UI, document expected latency"
    - scenario: "PDF text extraction quality issues with complex layouts"
      likelihood: medium
      impact: medium
      mitigation: "Start with simple text-heavy PDFs using built-in PDF parsing; upgrade to AI enrichment skillset if quality is insufficient"
    - scenario: "Terraform state management conflicts during iterative development"
      likelihood: low
      impact: medium
      mitigation: "Use remote backend (Azure Storage) for Terraform state; document destroy/apply workflow"
    - scenario: "OpenAI model token limits hit with large PDF content"
      likelihood: medium
      impact: high
      mitigation: "Implement chunking in the search index or use integrated vectorization; set max token limits in prompts"
    - scenario: "Managed Identity role assignment propagation delay"
      likelihood: medium
      impact: medium
      mitigation: "Add depends_on for role assignments in Terraform; allow up to 10 minutes for propagation after apply"
  assumptions:
    - "User has an active Azure subscription with Owner or User Access Administrator role (needed for role assignments)"
    - "Azure AI Foundry and OpenAI model access is approved for the subscription"
    - "PDF documents are text-based (not scanned images requiring OCR)"
    - "Development machine has Python 3.11+, Terraform, and Azure CLI installed"
    - "User is authenticated via az login for local development (DefaultAzureCredential chain)"
  constraints:
    - "Indexer schedule minimum interval is 5 minutes for standard tier"
    - "Blob indexer processes one container at a time"
    - "Azure AI Foundry / OpenAI models have regional availability limitations"
    - "PDF content extraction size limited by AI Search indexer tier limits"
    - "RBAC role assignments can take up to 10 minutes to propagate"
    - "No API keys used for service-to-service auth; all connections via Managed Identity"

implementation_specification:
  code_structure: |
    indexer-demo/
    ├── infra/                    # Terraform IaC
    │   ├── main.tf
    │   ├── variables.tf
    │   ├── outputs.tf
    │   └── terraform.tfvars.example
    ├── backend/                  # FastAPI backend
    │   ├── app/
    │   │   ├── main.py           # FastAPI app entry
    │   │   ├── config.py         # Environment/settings
    │   │   ├── search.py         # Azure AI Search client
    │   │   ├── openai_client.py  # Azure OpenAI RAG logic
    │   │   └── storage.py        # Blob Storage upload/manage
    │   ├── requirements.txt
    │   └── Dockerfile
    ├── frontend/                 # Streamlit UI
    │   ├── app.py                # Main Streamlit chat app
    │   ├── requirements.txt
    │   └── Dockerfile
    ├── docs/
    │   ├── plan/
    │   └── prd.yaml
    ├── sample-docs/              # Sample PDFs for testing
    └── README.md
  affected_areas:
    - "infra/ - All Azure resource provisioning"
    - "backend/ - API layer for search, RAG, and blob management"
    - "frontend/ - Streamlit chat interface"
    - "sample-docs/ - Test PDF documents"
  component_details:
    - component: "Terraform Infrastructure"
      responsibility: |
        Provision and configure all Azure resources: AI Search, Blob Storage, AI Foundry (with OpenAI model deployments),
        User-Assigned Managed Identity, and all RBAC role assignments. Enable system-assigned MI on AI Search.
        Configure indexer data source with managed identity connection to blob storage (ResourceId connection string).
      interfaces:
        - "terraform apply/destroy CLI"
        - "Output endpoints, resource IDs, and managed identity client IDs (no API keys)"
    - component: "FastAPI Backend"
      responsibility: "Serve REST API for chat queries (RAG), document upload/listing, and indexer status. Authenticate to all Azure services via DefaultAzureCredential (Managed Identity in production, az login locally)."
      interfaces:
        - "POST /api/chat - Send question, receive RAG answer"
        - "POST /api/documents/upload - Upload PDF to blob storage"
        - "GET /api/documents - List indexed documents"
        - "GET /api/indexer/status - Check indexer run status"
        - "POST /api/indexer/run - Trigger manual indexer run"
    - component: "Streamlit Frontend"
      responsibility: "Chat UI for asking questions, uploading/managing documents, and viewing indexer status"
      interfaces:
        - "Chat input/output panel"
        - "Document upload sidebar"
        - "Indexer status indicator"
  dependencies:
    - component: "Frontend → Backend"
      relationship: "Streamlit calls FastAPI REST endpoints for all operations"
    - component: "Backend → Azure AI Search"
      relationship: "FastAPI queries search index via Azure SDK with DefaultAzureCredential; manages indexer via REST API"
    - component: "Backend → Azure AI Foundry (OpenAI)"
      relationship: "FastAPI sends search results as context to OpenAI models in Foundry for answer generation via DefaultAzureCredential"
    - component: "Backend → Azure Blob Storage"
      relationship: "FastAPI uploads/manages PDFs in blob container via DefaultAzureCredential"
    - component: "Azure AI Search Indexer → Azure Blob Storage"
      relationship: "Indexer reads blobs on schedule via system-assigned MI (Storage Blob Data Reader role), detects changes via LastModified timestamp"
  integration_points:
    - "Blob Storage container ↔ AI Search indexer data source (managed identity ResourceId connection)"
    - "AI Search index ↔ FastAPI search queries (DefaultAzureCredential)"
    - "FastAPI RAG endpoint ↔ Azure AI Foundry OpenAI chat completions API (DefaultAzureCredential)"
    - "Streamlit HTTP calls ↔ FastAPI REST API"
    - "RBAC role assignments linking Managed Identities to resource-level permissions"

